name: Release

on:
  push:
    tags:
      - 'v*'
      - 'dfswitch-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0 or dfswitch-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
          - os: macos-13
            goos: darwin
            goarch: amd64
            ext: ''
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        run: npm ci
        working-directory: web

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#dfswitch-}"
          VERSION="${VERSION#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build (wails)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        shell: bash
        run: |
          wails build \
            -platform ${{ matrix.goos }}/${{ matrix.goarch }} \
            -ldflags "-X main.Version=${{ steps.ver.outputs.version }}" \
            -trimpath -clean

      - name: Package artifact (macOS)
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          cd build/bin
          APP="DFSwitch.app"
          if [ ! -d "$APP" ]; then APP=$(ls -d *.app | head -n 1); fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dfswitch-darwin-${{ matrix.goarch }}.zip"

      - name: Package artifact (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          cd build/bin
          $exe = Get-ChildItem -Filter *.exe | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath "dfswitch-windows-amd64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfswitch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/*.zip
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: release/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
